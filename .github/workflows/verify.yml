# =============================================================================
# Design Pulse — Verification Workflow
# =============================================================================
# Runs on every pull request to ensure code quality gates are met:
#   1. TypeScript compilation check
#   2. ESLint lint check
#   3. Vitest unit + integration tests (frontend)
#   4. Pytest unit tests (backend)
#
# E2E (Playwright) tests are NOT included — they require a running dev server
# with Supabase connectivity and are run locally or in a dedicated staging
# environment.
# =============================================================================

name: Verify

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: TypeScript, Lint, and Tests
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: designpulse-next

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: designpulse-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation check
        run: npx tsc --noEmit

      - name: ESLint lint check
        run: npm run lint

      - name: Run unit tests
        run: npx vitest run tests/unit/
        # Unit tests do not require Supabase credentials

      # Integration tests require Supabase credentials — only run if secrets
      # are available (skipped for external PRs / forks)
      - name: Run integration tests
        if: ${{ env.NEXT_PUBLIC_SUPABASE_URL != '' }}
        run: npx vitest run tests/integration/
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ---------------------------------------------------------------------------
  # Backend: Python tests
  # ---------------------------------------------------------------------------
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: designpulse-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: designpulse-backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: python -m pytest tests/ -v
